<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의류수거함 찾기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-layout">
    <header class="hero" role="banner">
      <div class="hero-inner">
        <div class="brand-row">
          <div class="logo">♻️</div>
          <h1 class="brand">분리수거에 진심</h1>
        </div>

        <div class="category-row" role="navigation" aria-label="카테고리">
          <button class="cat active">중소형 폐가전수거함</button>
          <button class="cat">폐의약품 수거함</button>
          <button class="cat">의류수거함</button>
          <button class="cat">폐형광등/폐건전지</button>
          <button class="cat">대형폐기물 수수료 정보</button>
          <button class="cat">생활쓰레기 배출 정보</button>
        </div>

        <form id="search-form" class="search-bar" action="/search" method="get">
          <div class="search-controls">
            <div class="select-type">
              <select name="addressType" aria-label="주소 유형">
                <option value="road">도로명</option>
                <option value="jibun">지번(읍면동)</option>
              </select>
            </div>

            <input
              id="address"
              name="address"
              type="text"
              placeholder="예) 환경로, 에코동..."
              autocomplete="street-address"
              required
            >

            <button type="submit" class="search-btn">주소 검색</button>
          </div>
        </form>
      </div>
    </header>

    <section class="content">
      <aside class="list-card">
        <h2>📍 수거함 위치 목록</h2>
        <div id="results" class="results-section" aria-live="polite"></div>
      </aside>

      <section class="map-card" aria-label="지도">
        <div id="map" class="map-container">지도 표시 영역</div>
      </section>
    </section>
  </main>

  <script src="clothing_collect_bins.js" defer></script>
  <script src="vworld.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>

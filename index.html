<!DOCTYPE html>
<html lang="ko" class="theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15803d" />
    <meta
      name="description"
      content="분리수거에 진심 - 지역을 입력하면 분리수거함 위치와 생활쓰레기 배출·폐기 비용 정보를 한 번에 확인하세요."
    />
    <title>분리수거에 진심</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- 헤더 -->
    <header class="site-header">
      <div class="site-header__inner">
        <div class="brand">
          <span class="brand__logo" data-lucide="recycle"></span>
          <div class="brand__text">
            <h1 class="brand__title">분리수거에 진심</h1>
            <p class="brand__subtitle">우리 동네 분리수거함 · 폐기물 배출정보</p>
          </div>
        </div>
        <div class="site-header__actions">
          <span id="modeBadge" class="mode-badge mode-badge--dummy">샘플 데이터 모드</span>
          <button id="openKeyDialog" class="btn btn--ghost">
            <span data-lucide="key-round"></span> API 키 설정
          </button>
        </div>
      </div>
    </header>

    <!-- 카테고리 탭 -->
    <nav class="category-bar" aria-label="분리수거 카테고리">
      <div class="category-bar__inner" id="categoryTabs" role="tablist"></div>
    </nav>

    <!-- 검색 컨트롤 -->
    <section class="search-bar">
      <form id="searchForm" class="search-bar__inner" autocomplete="off">
        <div class="segmented" role="group" aria-label="주소 검색 방식">
          <button type="button" class="seg-btn is-active" data-mode="road">도로명</button>
          <button type="button" class="seg-btn" data-mode="jibun">지번(읍·면·동)</button>
        </div>
        <div class="search-input">
          <span data-lucide="search" class="search-input__icon"></span>
          <input
            id="searchInput"
            type="text"
            placeholder="도로명을 입력하세요 (예: 중앙로, 테헤란로)"
            aria-label="주소 검색어"
          />
        </div>
        <button type="submit" class="btn btn--primary">
          <span data-lucide="search"></span> 조회
        </button>
      </form>
    </section>

    <!-- 본문: 좌우 2분할 -->
    <main class="content">
      <!-- 좌측 리스트 -->
      <section class="panel panel--list" aria-label="검색 결과 리스트">
        <div class="panel__head">
          <div id="selectedRegion" class="selected-region">
            <span data-lucide="info"></span> 지역을 선택해 주세요
          </div>
          <span id="resultCount" class="result-count">검색결과 0건</span>
        </div>
        <ul id="resultList" class="result-list"></ul>
      </section>

      <!-- 우측 지도 -->
      <section class="panel panel--map" aria-label="지도">
        <div id="mapArea" class="map-area"></div>
      </section>
    </main>

    <!-- 지역 선택 팝업 -->
    <div id="regionDialog" class="dialog" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="regionDialogTitle">
      <div class="dialog__overlay"></div>
      <div class="dialog__box">
        <div class="dialog__head">
          <h2 id="regionDialogTitle" class="dialog__title">검색결과</h2>
          <button class="dialog__close" data-close-dialog aria-label="닫기">
            <span data-lucide="x"></span>
          </button>
        </div>
        <p class="dialog__desc">전국에서 동일한 명칭을 가진 위치 목록입니다. 하나를 선택하세요.</p>
        <ul id="regionResults" class="region-results"></ul>
      </div>
    </div>

    <!-- API 키 설정 팝업 -->
    <div id="keyDialog" class="dialog" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="keyDialogTitle">
      <div class="dialog__overlay"></div>
      <div class="dialog__box">
        <div class="dialog__head">
          <h2 id="keyDialogTitle" class="dialog__title">API 키 설정</h2>
          <button class="dialog__close" data-close-dialog aria-label="닫기">
            <span data-lucide="x"></span>
          </button>
        </div>
        <p class="dialog__desc">
          키를 입력하면 실제 OpenAPI와 연동됩니다. 비워두면 내장 샘플 데이터로 동작합니다.
        </p>
        <label class="field">
          <span class="field__label">카카오 지도 JavaScript 키</span>
          <input id="kakaoKeyInput" type="text" class="field__input" placeholder="Kakao JavaScript Key" />
        </label>
        <label class="field">
          <span class="field__label">VWorld API Key</span>
          <input id="vworldKeyInput" type="text" class="field__input" placeholder="VWorld API Key" />
        </label>
        <label class="field">
          <span class="field__label">Clothing Collect Bins API Key</span>
          <input id="clothingKeyInput" type="text" class="field__input" placeholder="CLOTHING_COLLECT_BINS_API_KEY" />
        </label>
        <label class="field">
          <span class="field__label">공공데이터포털 서비스키 (data.go.kr)</span>
          <input id="dataKeyInput" type="text" class="field__input" placeholder="Service Key" />
        </label>
        <div class="dialog__foot">
          <button class="btn btn--ghost" data-close-dialog>취소</button>
          <button id="saveKeys" class="btn btn--primary">저장 후 새로고침</button>
        </div>
      </div>
    </div>

    <!-- lucide 아이콘 -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Load optional local keys (js/keys.local.js) if present; not committed to repo -->
    <script>
      (function(){
        var s = document.createElement('script');
        s.src = 'js/keys.local.js';
        s.async = false;
        s.onerror = function(){ /* no-op if file missing */ };
        document.head.appendChild(s);
      })();
    </script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
